<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Clinic Information System</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#F4F7FB;
}

.main{
    margin-left:260px;
    min-height:100vh;
}

.topbar{

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 35px;

    background:#fff;

    box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.user-profile{

    display:flex;
    align-items:center;
    gap:10px;
    color:#0F766E;
    font-weight:bold;

}

.content{

    padding:30px;

}
/* ===============================
   DASHBOARD BACKGROUND
================================ */

.dashboard-background{

    width:100%;

    min-height:750px;

    background-image:url("images/dashboard-bg.jpg");

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;

    border-radius:20px;

    padding:30px;

    box-shadow:0 10px 30px rgba(0,0,0,.20);

    position:relative;

    overflow:hidden;

}

/* ===========================
   HERO
=========================== */

.dashboard-hero{

    width:100%;

    min-height:650px;

    position:relative;

}


/* ===========================
   STATISTICS
=========================== */

.stats-grid{

    position:relative;

    z-index:2;

    width:95%;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:20px;

    margin-bottom:30px;

}

.card{

    background:rgba(255,255,255,.92);

    backdrop-filter:blur(12px);

    border-radius:18px;

    padding:25px;

    cursor:pointer;

    transition:.3s;

    box-shadow:0 10px 30px rgba(0,0,0,.18);

}

.card:hover{

    transform:translateY(-8px);

}

.card h4{

    display:flex;

    align-items:center;

    gap:10px;

    color:#555;

    font-size:17px;

}

.card h2{

    margin-top:15px;

    color:#0F766E;

    font-size:50px;

}

/* Responsive */

@media(max-width:1100px){

.stats-grid{

grid-template-columns:repeat(2,1fr);

}

}

@media(max-width:700px){

.main{

margin-left:0;

}

.stats-grid{

grid-template-columns:1fr;

}

.dashboard-hero{

height:auto;

padding:30px 0;

}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

<img src="images/logo.png">

<h2>Clinic Information System</h2>

</div>

<ul>

<li>
<a id="menuDashboard" class="active" href="dashboard.html">
<i class="fa-solid fa-house"></i>
<span>Dashboard</span>
</a>
</li>

<li>
<a id="menuConsultation" href="consultation.html">
<i class="fa-solid fa-user-doctor"></i>
<span>New Consultation</span>
</a>
</li>

<li>
<a id="menuMedicalRecords" href="medicalrecords.html">
<i class="fa-solid fa-folder-open"></i>
<span>Medical Records</span>
</a>
</li>

<li>
<a id="menuSickLeave" href="sickleave.html">
<i class="fa-solid fa-file-medical"></i>
<span>Sick Leave</span>
</a>
</li>

<li>
<a id="menuAdminTools" href="admintools.html">
<i class="fa-solid fa-user-shield"></i>
<span>Admin Tools</span>
</a>
</li>

<li>
<a id="menuRecycleBin" href="recyclebin.html">
<i class="fa-solid fa-trash-can"></i>
<span>Recycle Bin</span>
</a>
</li>

<li>
<a id="menuLogout" href="index.html">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</a>
</li>

</ul>

</div>

<div class="main">

<div class="topbar">

<h1>Dashboard</h1>

<div class="user-profile">

<i class="fa-solid fa-circle-user fa-2x"></i>

<span id="loggedUser"></span>

</div>

</div>

<div class="content">

   <div class="dashboard-background">

        <div class="dashboard-hero">

            <div class="stats-grid">
    <!-- CARD 1 -->

<div class="card"
onclick="window.location.href='patientlist.html?type=today'">

    <h4>
        <i class="fa-solid fa-stethoscope"></i>
        Today's Consultations
    </h4>

    <h2 id="todayConsultation">0</h2>

</div>

<!-- CARD 2 -->

<div class="card"
onclick="window.location.href='patientlist.html?type=employees'">

    <h4>
        <i class="fa-solid fa-users"></i>
        Registered Employees
    </h4>

    <h2 id="employeeCount">0</h2>

</div>

<!-- CARD 3 -->

<div class="card"
onclick="window.location.href='patientlist.html?type=guests'">

    <h4>
        <i class="fa-solid fa-user"></i>
        Registered Guests
    </h4>

    <h2 id="guestCount">0</h2>

</div>

<!-- CARD 4 -->

<div class="card"
onclick="window.location.href='sickleaverecords.html'">

    <h4>
        <i class="fa-solid fa-file-medical"></i>
        Sick Leaves Issued
    </h4>

    <h2 id="sickLeaveCount">0</h2>

</div>

</div>
        </div> <!-- stats-grid -->

    </div> <!-- dashboard-hero -->

</div> <!-- dashboard-background -->

</div> <!-- content -->

<script>

// Logged User
document.getElementById("loggedUser").textContent =
sessionStorage.getItem("currentUser") || "Clinic Staff";

// Logout
function logout(){

    sessionStorage.clear();

    window.location.href="index.html";

}

</script>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
