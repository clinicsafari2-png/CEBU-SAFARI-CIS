<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clinic Information System | Login</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

    background:linear-gradient(135deg,#0F766E,#14B8A6);

}

.login-container{

    width:400px;
    background:white;
    border-radius:15px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.logo{

    text-align:center;
    margin-bottom:25px;

}

.logo img{

    width:90px;
    margin-bottom:10px;

}

.logo h2{

    color:#0F766E;

}

.logo p{

    color:#666;
    font-size:14px;

}

.input-group{

    position:relative;
    margin-bottom:20px;

}

.input-group input{

    width:100%;
    padding-left:45px;
    padding-right:45px;

}

.input-group i{

    position:absolute;
    left:15px;
    top:14px;
    color:#0F766E;

}

.password-toggle{

    position:absolute;
    top:30%;
    right:15px;
    transform:translateY(-50%);
    display:flex;
    align-items:center;
    justify-content:center;
    width:20px;
    height:20px;
    cursor:pointer;
    color:#0F766E;

}

.input-group{

    position:relative;
    margin-bottom:20px;
    display:flex;
    align-items:center;

}
button{

    width:100%;
}

.footer{

    margin-top:20px;
    text-align:center;

}

.footer a{

    color:#0F766E;
    text-decoration:none;
    font-weight:bold;

}

.footer a:hover{

    text-decoration:underline;

}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">

<img src="images/logo.png" alt="Clinic Logo">

<h2>Clinic Information System</h2>

<p>Please login to continue</p>

</div>

<form id="loginForm">

<div class="input-group">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="username"
placeholder="Username"
required>

</div>

<div class="input-group">

    <i class="fa-solid fa-lock"></i>

    <input
        type="password"
        id="password"
        placeholder="Password"
        required>

    <span
        class="password-toggle"
        id="togglePassword">

        <i class="fa-solid fa-eye"></i>

    </span>

</div>
<button
type="submit"
class="btn btn-primary">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</form>

<div class="footer">

Don't have an account?

<a href="signup.html">

Create Account

</a>

</div>

</div>

<script>
const toggle = document.getElementById("togglePassword");
const icon = toggle.querySelector("i");
const password = document.getElementById("password");

toggle.addEventListener("click", () => {

    if (password.type === "password") {

        password.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");

    } else {

        password.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");

    }

});
</script>

<script type="module" src="js/login.js"></script>

</body>
</html>
</body>
</html>
